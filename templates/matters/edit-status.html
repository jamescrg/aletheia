<div>
  <input autofocus
         class="edit-matter-input"
         type="text"
         name="description"
         hx-post="{% url 'matters:edit-description' id=matter.id %}"
         hx-target="#matter-{{ matter.id }}"
         hx-trigger="change, blur"
         onfocus="moveFocusToEnd(this)"
         hx-trigger="change, blur, keyup[key=='Enter']"
         hx-swap="outerHTML"
         value="{{ matter.description }}" />
</div>

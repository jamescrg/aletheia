<div class="note-canvas{% if note.is_synced %} note-readonly{% endif %}">
  {% if note.is_synced %}
    <div class="note-synced-banner">
      <i class="icon-cloud"></i>
      Synced from Google Drive — read-only here. Edit this note in Drive.
    </div>
  {% endif %}
  <div class="note-header">
    <input type="text"
           id="note-title"
           class="note-title-input"
           data-note-id="{{ note.id }}"
           value="{{ note.title }}"
           {% if note.is_synced %}readonly{% endif %}>
  </div>
  <div class="note-meta"
       hx-get="{% if note.matter %}{% url 'case:note-meta' note.id %}{% else %}{% url 'notes:note-meta' note.id %}{% endif %}"
       hx-trigger="noteSaved from:body"
       hx-swap="innerHTML">{% include "notes/meta.html" %}</div>
  <div id="note-editor"></div>
</div>
<!-- Floating Reference Picker -->
<div class="sources-picker" id="reference-picker">
  <input type="search"
         id="reference-search"
         name="q"
         placeholder="Search sources..."
         autocomplete="off">
  <div id="reference-results">
    <div class="sources-empty-state">
      <i class="icon-search"></i>
      <p>Search for highlights and documents to insert</p>
    </div>
  </div>
</div>
<script>
  window.NOTE_DATA = {
    id: {{ note.id }},
    readOnly: {{ note.is_synced|yesno:"true,false" }},
    title: "{{ note.title|escapejs }}",
    content: "{{ note.content|escapejs }}",
    autosaveUrl: "{% if note.matter %}{% url 'case:note-autosave' note.id %}{% else %}{% url 'notes:note-autosave' note.id %}{% endif %}",
    titleUrl: "{% if note.matter %}{% url 'case:note-title' note.id %}{% else %}{% url 'notes:note-title' note.id %}{% endif %}",
    searchUrl: "{% if note.matter %}{% url 'case:note-reference-search' note.id %}{% else %}{% url 'notes:note-reference-search' note.id %}{% endif %}",
    citationsUrl: "{% if note.matter %}{% url 'case:note-citations' note.id %}{% else %}{% url 'notes:note-citations' note.id %}{% endif %}",
  };
</script>

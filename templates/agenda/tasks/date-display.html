{% if task.date_due %}
  <a href="#"
     hx-get="/agenda/tasks/{{ task.id }}/task-date"
     hx-target="closest td">{{ task.date_due|date:'Y-m-d' }}</a>
  <button class="btn-date-bump"
          hx-post="{% url 'agenda:tasks-date-bump' task.id %}"
          hx-target="#tasks"
          title="+1 day">
    <i class="icon-plus"></i>
  </button>
{% else %}
  <a href="#"
     class="empty-date-icon"
     hx-get="/agenda/tasks/{{ task.id }}/task-date"
     hx-target="closest td">
    <i class="icon-calendar-plus"></i>
  </a>
{% endif %}

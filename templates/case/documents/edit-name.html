<input autofocus
       class="edit-document-name-input"
       type="text"
       name="name"
       hx-post="{% url 'case:documents-edit-name' document.id %}"
       hx-target="#document-{{ document.id }}"
       hx-trigger="change, blur, keyup[key=='Enter']"
       onfocus="moveFocusToEnd(this)"
       hx-swap="outerHTML"
       value="{{ document.name }}" />

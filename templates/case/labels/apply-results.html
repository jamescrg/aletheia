<div class="labels-flow apply-labels-flow">
  {% for label in labels %}
    <a href="#"
       class="app-badge label-{{ label.color }}"
       hx-post="{% url 'case:add-label-to' object_type object.id %}"
       hx-vals='{"label_id": "{{ label.id }}"{% if view %}, "view": "{{ view }}"{% endif %}}'
       hx-target="#{{ object_type }}-{{ object.id }}"
       hx-swap="outerHTML"
       @click="$dispatch('close-modal')">{{ label.name }}</a>
  {% empty %}
    <span class="apply-labels-empty">No matching labels found.</span>
  {% endfor %}
</div>
<div class="create-label-section">
  <div class="create-label-header">
    <i class="icon-plus"></i>Create New Label
  </div>
  <form class="create-label-form"
        hx-post="{% url 'case:labels-create-and-apply' object_type object.id %}"
        hx-target="#{{ object_type }}-{{ object.id }}"
        hx-swap="outerHTML">
    {% if view %}<input type="hidden" name="view" value="{{ view }}">{% endif %}
    <input type="text"
           name="name"
           placeholder="Label name"
           class="form-control"
           required>
    <select name="color" class="form-select">
      <option value="blue">Blue</option>
      <option value="gray" selected>Gray</option>
      <option value="green">Green</option>
      <option value="orange">Orange</option>
      <option value="purple">Purple</option>
      <option value="red">Red</option>
      <option value="yellow">Yellow</option>
    </select>
    <button type="submit"
            class="btn btn-success"
            @click="$dispatch('close-modal')">Create</button>
  </form>
</div>

{% extends "base-minimal.html" %}
{% load static %}
{% load cache_buster %}
{% block title %}
  {{ note.title }} - LawAdmin
{% endblock title %}
{% block content %}
  {% csrf_token %}
  <link rel="stylesheet" href="{% static_v 'css/apps/notes.css' %}" />
  <div class="note-toolbar-wrapper">
    <div class="note-toolbar">
      <div class="toolbar-left">
        <div class="dropdown">
          <button type="button"
                  class="select-btn"
                  data-bs-toggle="dropdown"
                  title="Insert Reference">
            <i class="bi bi-link-45deg"></i> Insert
            <small><i class="bi bi-chevron-down"></i></small>
          </button>
          <ul class="dropdown-menu">
            <li>
              <a class="dropdown-item" href="#" data-ref-type="document">
                <i class="bi bi-file-earmark"></i> Document
              </a>
            </li>
            <li>
              <a class="dropdown-item" href="#" data-ref-type="highlight">
                <i class="bi bi-highlighter"></i> Highlight
              </a>
            </li>
          </ul>
        </div>
      </div>
      <div class="toolbar-center"></div>
      <div class="toolbar-right">
        <a href="#"
           id="close-btn"
           onclick="window.close(); return false;"
           title="Close">
          <i class="bi bi-x-lg"></i>
        </a>
      </div>
    </div>
  </div>
  <div class="note-page standalone">
    <div class="note-canvas">
      <div class="note-header">
        <span class="note-title">{{ note.title }}</span>
        <span class="save-status" id="save-status"></span>
      </div>
      <div id="note-editor"></div>
    </div>
  </div>
  <!-- Reference Picker Modal -->
  <div class="reference-picker-overlay" id="reference-picker-overlay">
    <div class="reference-picker" id="reference-picker">
      <div class="reference-picker-header">
        <span id="picker-title">Insert Reference</span>
        <button type="button" id="picker-close" class="btn-icon">
          <i class="bi bi-x-lg"></i>
        </button>
      </div>
      <div class="reference-picker-tabs">
        <button type="button" class="picker-tab active" data-type="document">Documents</button>
        <button type="button" class="picker-tab" data-type="highlight">Highlights</button>
      </div>
      <input type="search"
             id="reference-search"
             name="q"
             placeholder="Search..."
             class="reference-search-input"
             autocomplete="off">
      <div id="reference-results" class="reference-results"></div>
    </div>
  </div>
  <script>
    window.NOTE_DATA = {
      id: {{ note.id }},
      content: "{{ note.content|escapejs }}",
      autosaveUrl: "{% url 'case:note-autosave' note.id %}",
      searchUrl: "{% url 'case:note-reference-search' note.id %}",
    };
  </script>
  <script type="module" src="{% static_v 'js/notes-editor.js' %}"></script>
{% endblock content %}
